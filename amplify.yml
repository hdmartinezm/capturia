version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      env:
        variables:
          # La API key de Gemini se configura en la consola de Amplify
          # como variable de entorno (Environment Variables)
          NEXT_TELEMETRY_DISABLED: "1"
