version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Create runtime config file with API keys (will be bundled with SSR)
        - |
          cat > lib/runtime-config.ts << 'RUNTIME_EOF'
          export const GEMINI_KEY = "$GOOGLE_GENERATIVE_AI_API_KEY";
          export const OPENAI_KEY = "$OPENAI_API_KEY";
          RUNTIME_EOF
        - sed -i "s|\$GOOGLE_GENERATIVE_AI_API_KEY|$GOOGLE_GENERATIVE_AI_API_KEY|g" lib/runtime-config.ts
        - sed -i "s|\$OPENAI_API_KEY|$OPENAI_API_KEY|g" lib/runtime-config.ts
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
